<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sunpark Grill Bar</title>

<link href="https://fonts.googleapis.com/css2?family=Marck+Script&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    height:100%;
}

body{
    background:url('bg1.jpg') center center / cover no-repeat;
    font-family:Arial, sans-serif;
    overflow:hidden;
    position:relative;
}

/* Верхняя строка */

.top-bar{
    position:absolute;
    top:20px;
    left:20px;
    right:20px;

    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;

    color:white;
    font-size:12px;
    letter-spacing:0.3px;
    font-weight:500;

    text-shadow:
        0 2px 4px rgba(0,0,0,.8);
}

/* Нижние ссылки */

.menu-links{
    position:absolute;
    left:50%;
    bottom:8%;

    transform:translateX(-50%);

    width:90%;

    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
}

.menu-links a{
    text-decoration:none;

    color:#fff5e8;

    font-family:'Marck Script', cursive;
    font-size:clamp(30px, 4vw, 56px);

    text-align:center;

    text-shadow:
        0 3px 8px rgba(0,0,0,.8);

    transition:.2s;
}

.menu-links a:hover{
    transform:scale(1.03);
}

.menu-links a:active{
    transform:scale(.98);
}

/* Телефоны */

@media (max-width:768px){

    .top-bar{
        flex-direction:column;
        gap:5px;

        text-align:center;
        font-size:11px;

        top:12px;
        left:10px;
        right:10px;
    }

    .menu-links{
        bottom:6%;
        gap:10px;
    }

    .menu-links a{
        font-size:clamp(26px, 7vw, 42px);
        line-height:1.1;
    }
}

</style>
</head>

<body>

<div class="top-bar">

    <div>
        ПН-ПТ: 11:00–23:00 &nbsp;&nbsp; СБ-ВС: 12:00–23:00
    </div>

    <div>
        +7 (911) 714-40-12
    </div>

    <div>
        г. Санкт-Петербург, м. Озерки, ул. Никольская 9
    </div>

</div>

<div class="menu-links">

    <a href="menu.pdf" target="_blank">
        Смотреть основное меню
    </a>

    <a href="Menu_alco.pdf" target="_blank">
        Смотреть алкогольное меню
    </a>

    <a href="menu.pdf" download>
        Скачать PDF файл
    </a>

</div>

</body>
</html>
